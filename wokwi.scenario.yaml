name: Alarm Clock Boot & Button Test
version: 1

steps:
  # ── 1. Banner ────────────────────────────────────────────────
  - wait-serial: "ESP32 Bedside Alarm Clock"

  # ── 2. RTC init ──────────────────────────────────────────────
  - wait-serial: "[RTC]"

  # ── 3. SD fails gracefully ───────────────────────────────────
  - wait-serial: "backup tone"

  # ── 4. LittleFS mounts ───────────────────────────────────────
  - wait-serial: "[LFS]"

  # ── 5. Boot complete ─────────────────────────────────────────
  - wait-serial: "[BOOT]  Ready."

  # ── 6. Let the clock tick one second ────────────────────────
  - delay: 1500ms

  # ── 7. Enable alarm via blue button ─────────────────────────
  - set-control:
      part: btn_alarm
      control: pressed
      value: "1"
  - delay: 100ms
  - set-control:
      part: btn_alarm
      control: pressed
      value: "0"
  - wait-serial: "Alarm ENABLED"

  # ── 8. Increment hour ────────────────────────────────────────
  - set-control:
      part: btn_hour
      control: pressed
      value: "1"
  - delay: 100ms
  - set-control:
      part: btn_hour
      control: pressed
      value: "0"
  - wait-serial: "Alarm hour"

  # ── 9. Increment minute ──────────────────────────────────────
  - set-control:
      part: btn_minute
      control: pressed
      value: "1"
  - delay: 100ms
  - set-control:
      part: btn_minute
      control: pressed
      value: "0"
  - wait-serial: "Alarm minute"

  # ── 10. Disable alarm ────────────────────────────────────────
  - set-control:
      part: btn_alarm
      control: pressed
      value: "1"
  - delay: 100ms
  - set-control:
      part: btn_alarm
      control: pressed
      value: "0"
  - wait-serial: "Alarm DISABLED"

  # ── 11. Wait for periodic status print (every 10 s) ─────────
  - wait-serial: "[STAT]"
