name: Alarm Clock Boot & Button Test
version: 1

steps:
  # ── 1. Banner ────────────────────────────────────────────────
  - wait-serial: "ESP32 Bedside Alarm Clock"

  # ── 2. RTC init ──────────────────────────────────────────────
  - wait-serial: "[RTC]"

  # ── 3. SD fails gracefully ───────────────────────────────────
  - wait-serial: "backup tone"

  # ── 4. LittleFS mounts ───────────────────────────────────────
  - wait-serial: "[LFS]"

  # ── 5. Boot complete ─────────────────────────────────────────
  - wait-serial: "[BOOT]  Ready."

  # ── 6. Let the clock tick ────────────────────────────────────
  - delay: 2000ms

  # ── 7. Enable alarm ──────────────────────────────────────────
  - button:
      part: btn_alarm
      action: click
  - wait-serial: "Alarm ENABLED"

  # ── 8. Increment hour ────────────────────────────────────────
  - button:
      part: btn_hour
      action: click
  - wait-serial: "Alarm hour"

  # ── 9. Increment minute ──────────────────────────────────────
  - button:
      part: btn_minute
      action: click
  - wait-serial: "Alarm minute"

  # ── 10. Disable alarm ────────────────────────────────────────
  - button:
      part: btn_alarm
      action: click
  - wait-serial: "Alarm DISABLED"

  # ── 11. Wait for periodic status print ───────────────────────
  - wait-serial: "[STAT]"
