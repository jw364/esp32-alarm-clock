; ============================================================
; ESP32 Bedside Alarm Clock — PlatformIO build config
; ============================================================
; Platform: espressif32 7.x, Arduino core 2.0.17, IDF 4.4, GCC 8.4
; ESP32-audioI2S pinned to v2.0.6 (last v2.x tag) for core 2.x compatibility.
; Backup tone uses LittleFS WAV (generated at boot) played through the Audio
; library — no direct IDF I2S driver access needed.
; ============================================================

[platformio]
src_dir = .

[env:esp32dev]
platform               = espressif32
board                  = esp32dev
framework              = arduino
monitor_speed          = 115200
board_build.partitions = huge_app.csv

build_flags =
    -DCORE_DEBUG_LEVEL=0

lib_deps =
    adafruit/RTClib @ ^2.1.4
    adafruit/Adafruit GFX Library @ ^1.11.9
    adafruit/Adafruit LED Backpack Library @ ^1.5.0
    https://github.com/schreibfaul1/ESP32-audioI2S.git#2.0.6
    ; TM1637Display bundled locally in lib/TM1637Display/ (upstream repo unavailable)
    ; SD and LittleFS are included with the ESP32 Arduino core
