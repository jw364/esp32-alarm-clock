name: Wokwi Simulation

on:
  push:
    branches: [wokwi-validation, main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  simulate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-${{ hashFiles('platformio.ini') }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware
        run: pio run

      - name: Stage firmware artifacts
        run: |
          mkdir -p firmware
          cp .pio/build/esp32dev/firmware.bin firmware/firmware.bin
          cp .pio/build/esp32dev/firmware.elf firmware/firmware.elf
          echo "firmware.bin: $(wc -c < firmware/firmware.bin) bytes"
          echo "firmware.elf: $(wc -c < firmware/firmware.elf) bytes"

      - name: Run Wokwi simulation (official action)
        uses: wokwi/wokwi-ci-action@v1
        with:
          token: ${{ secrets.WOKWI_CLI_TOKEN }}
          timeout: 10000
          expect_text: 'HELLO WOKWI'
        continue-on-error: true

      - name: Print serial output
        if: always()
        run: |
          echo "=== SERIAL LOG ==="
          cat serial.log 2>/dev/null || echo "(no serial.log)"
