name: Wokwi Simulation

on:
  push:
    branches: [wokwi-validation, main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  simulate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-${{ hashFiles('platformio.ini') }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware
        run: pio run

      - name: Verify firmware
        run: |
          ls -la .pio/build/esp32dev/firmware.bin .pio/build/esp32dev/firmware.elf
          file .pio/build/esp32dev/firmware.bin
          cat wokwi.toml

      - name: Install wokwi-cli
        run: |
          wget -q -O /usr/local/bin/wokwi-cli \
            https://github.com/wokwi/wokwi-cli/releases/latest/download/wokwi-cli-linuxstatic-x64
          chmod +x /usr/local/bin/wokwi-cli
          wokwi-cli --version

      - name: Run Wokwi simulation (debug verbose)
        env:
          WOKWI_CLI_TOKEN: ${{ secrets.WOKWI_CLI_TOKEN }}
          DEBUG: '*'
        run: |
          wokwi-cli --timeout 10000 --serial-log-file serial.log . 2>&1 | head -200
        continue-on-error: true

      - name: Print serial output
        if: always()
        run: |
          echo "=== SERIAL LOG ($(wc -c < serial.log 2>/dev/null || echo 0) bytes) ==="
          cat serial.log 2>/dev/null || echo "(no serial.log)"
