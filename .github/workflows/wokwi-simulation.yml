name: Wokwi Simulation

on:
  push:
    branches: [wokwi-validation, main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  simulate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-${{ hashFiles('platformio.ini') }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware
        run: pio run

      - name: Stage firmware artifacts
        run: |
          mkdir -p firmware
          cp .pio/build/esp32dev/firmware.bin firmware/firmware.bin
          echo "firmware.bin: $(wc -c < firmware/firmware.bin) bytes"
          md5sum firmware/firmware.bin
          file firmware/firmware.bin
          xxd firmware/firmware.bin | head -4

      - name: Show project structure
        run: |
          echo "=== wokwi.toml ==="
          cat wokwi.toml
          echo "=== diagram.json ==="
          cat diagram.json
          echo "=== CWD ==="
          pwd
          echo "=== firmware/ ==="
          ls -la firmware/

      - name: Install wokwi-cli
        run: |
          wget -q -O /usr/local/bin/wokwi-cli \
            https://github.com/wokwi/wokwi-cli/releases/latest/download/wokwi-cli-linuxstatic-x64
          chmod +x /usr/local/bin/wokwi-cli
          wokwi-cli --version

      - name: Run Wokwi simulation
        env:
          WOKWI_CLI_TOKEN: ${{ secrets.WOKWI_CLI_TOKEN }}
        run: |
          wokwi-cli \
            --timeout 10000 \
            --serial-log-file serial.log \
            .
        continue-on-error: true

      - name: Print serial output
        if: always()
        run: |
          echo "=== SERIAL LOG ($(wc -c < serial.log 2>/dev/null || echo 0) bytes) ==="
          xxd serial.log 2>/dev/null || echo "(no serial.log)"
