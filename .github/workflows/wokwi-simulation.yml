name: Wokwi Simulation

on:
  push:
    branches: [wokwi-validation, main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  simulate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-${{ hashFiles('platformio.ini') }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware
        run: pio run

      - name: Verify firmware artifacts
        run: |
          ls -la .pio/build/esp32dev/firmware.bin .pio/build/esp32dev/firmware.elf \
                 .pio/build/esp32dev/bootloader.bin .pio/build/esp32dev/partitions.bin
          file .pio/build/esp32dev/firmware.bin

      - name: Install wokwi-cli
        run: |
          wget -q -O /usr/local/bin/wokwi-cli \
            https://github.com/wokwi/wokwi-cli/releases/latest/download/wokwi-cli-linuxstatic-x64
          chmod +x /usr/local/bin/wokwi-cli
          wokwi-cli --version

      - name: Run Wokwi simulation
        env:
          WOKWI_CLI_TOKEN: ${{ secrets.WOKWI_CLI_TOKEN }}
        run: |
          wokwi-cli \
            --timeout 60000 \
            --scenario wokwi.scenario.yaml \
            --serial-log-file serial.log \
            .
        continue-on-error: true

      - name: Print serial output
        if: always()
        run: |
          echo "=== SERIAL LOG ($(wc -c < serial.log 2>/dev/null || echo 0) bytes) ==="
          cat serial.log 2>/dev/null || echo "(no serial.log)"

      - name: Upload serial log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: serial-log
          path: serial.log
