name: Wokwi Simulation

on:
  push:
    branches: [wokwi-validation, main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  simulate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-${{ hashFiles('platformio.ini') }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware
        run: pio run

      - name: Stage firmware artifacts
        run: |
          mkdir -p firmware
          cp .pio/build/esp32dev/firmware.bin firmware/firmware.bin
          cp .pio/build/esp32dev/firmware.elf firmware/firmware.elf
          echo "firmware.bin: $(wc -c < firmware/firmware.bin) bytes"
          echo "firmware.elf: $(wc -c < firmware/firmware.elf) bytes"

      - name: Install wokwi-cli
        run: |
          wget -q -O /usr/local/bin/wokwi-cli \
            https://github.com/wokwi/wokwi-cli/releases/latest/download/wokwi-cli-linuxstatic-x64
          chmod +x /usr/local/bin/wokwi-cli
          wokwi-cli --version

      - name: Run Wokwi simulation (no scenario — raw serial capture test)
        env:
          WOKWI_CLI_TOKEN: ${{ secrets.WOKWI_CLI_TOKEN }}
        run: |
          wokwi-cli \
            --timeout 10000 \
            --serial-log-file serial.log \
            .
        continue-on-error: true

      - name: Print serial output
        if: always()
        run: |
          echo "=== SERIAL LOG ($(wc -c < serial.log 2>/dev/null || echo 0) bytes) ==="
          cat serial.log 2>/dev/null || echo "(empty)"

      - name: Upload serial log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: serial-log
          path: serial.log
          if-no-files-found: warn
